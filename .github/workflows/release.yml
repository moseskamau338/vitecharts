name: Release

on:
  push:
    branches: [main]

# Avoid overlapping release runs.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the version PR / push tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # required for npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # When changesets exist on main, this opens/updates a "Version Packages" PR.
      # When that PR is merged (versions bumped, changelogs written), it publishes.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
